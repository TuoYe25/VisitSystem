{% extends "base.html" %}
{% block title %}用户管理{% endblock %}

{% block extra_head %}
<style>
    .role-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .role-pi { background: #ef4444; color: white; }
    .role-crc { background: #22c55e; color: white; }
    
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">用户管理</h4>
</div>

<!-- 创建用户 -->
<div class="table-card mb-4">
    <div class="card-header">创建新用户</div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" id="newUsername" placeholder="英文字母和数字">
            </div>
            <div class="col-md-3">
                <label class="form-label">显示名称</label>
                <input type="text" class="form-control" id="newDisplayName" placeholder="如：王协调员">
            </div>
            <div class="col-md-2">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="newPassword" placeholder="至少6位">
            </div>
            <div class="col-md-2">
                <label class="form-label">角色</label>
                <select class="form-select" id="newRole">
                    <option value="CRC">CRC（临床研究协调员）</option>
                    <option value="PI">PI（主要研究者）</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="createUser()">创建</button>
            </div>
        </div>
    </div>
</div>

<!-- 用户列表 -->
<div class="table-card mb-4">
    <div class="card-header">用户列表</div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>用户名</th>
                        <th>显示名称</th>
                        <th>角色</th>
                        <th>负责受试者</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>


{% endblock %}

{% block extra_scripts %}
<script>
    async function createUser() {
        const username = document.getElementById('newUsername').value.trim();
        const display_name = document.getElementById('newDisplayName').value.trim();
        const password = document.getElementById('newPassword').value.trim();
        const role = document.getElementById('newRole').value;

        if (!username || !display_name || !password) {
            showToast('请填写所有字段', 'error'); return;
        }
        if (password.length < 6) {
            showToast('密码至少6位', 'error'); return;
        }

        try {
            await api('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, display_name, role })
            });
            showToast('用户创建成功', 'success');
            document.getElementById('newUsername').value = '';
            document.getElementById('newDisplayName').value = '';
            document.getElementById('newPassword').value = '';
            loadUsers();
        } catch (e) {
            // error already shown by api()
        }
    }

    async function loadUsers() {
        try {
            const users = await api('/api/users');
            const tbody = document.getElementById('userTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">暂无用户</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.username}</td>
                    <td>${u.display_name}</td>
                    <td><span class="role-badge ${u.role === 'PI' ? 'role-pi' : 'role-crc'}">${u.role}</span></td>
                    <td>${u.subject_count >= 0 ? u.subject_count + ' 名受试者' : '全部'}</td>
                </tr>
            `).join('');
        } catch (e) {
            // error already shown by api()
        }
    }

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadUsers();
    });
</script>
{% endblock %}
